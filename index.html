<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HumFinder Pro - זיהוי שירים</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
            touch-action: manipulation;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 15px;
        }
        
        header {
            text-align: center;
            padding: 30px 0 15px;
        }
        
        .logo {
            font-size: 2.5em;
            font-weight: 800;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5, #ff00cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-size: 1em;
            color: #a0a0a0;
            font-weight: 300;
        }
        
        .api-status {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-top: 8px;
            font-weight: 600;
        }
        
        .api-status.online {
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }
        
        .api-status.offline {
            background: rgba(255, 71, 87, 0.15);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.3);
        }
        
        .api-status.local {
            background: rgba(254, 202, 87, 0.15);
            color: #feca57;
            border: 1px solid rgba(254, 202, 87, 0.3);
        }
        
        .main-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px 20px;
            margin: 15px 0;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        
        .api-config {
            background: rgba(0,0,0,0.2);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .api-config h3 {
            font-size: 1em;
            margin-bottom: 12px;
            color: #00d2ff;
        }
        
        .api-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .api-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 0.9em;
            font-family: inherit;
        }
        
        .api-input::placeholder {
            color: #666;
        }
        
        .api-input:focus {
            outline: none;
            border-color: #00d2ff;
        }
        
        .btn-small {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
            white-space: nowrap;
        }
        
        .btn-small:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 210, 255, 0.3);
        }
        
        .mic-container {
            text-align: center;
            margin: 25px 0;
            user-select: none;
        }
        
        .mic-button {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #00d2ff, #3a7bd5);
            color: white;
            font-size: 3em;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0, 210, 255, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            -webkit-touch-callout: none;
        }
        
        .mic-button:active {
            transform: scale(0.95);
        }
        
        .mic-button.recording {
            animation: pulse-record 1.2s infinite;
            background: linear-gradient(145deg, #ff00cc, #ff0066);
            box-shadow: 0 10px 40px rgba(255, 0, 204, 0.5);
        }
        
        @keyframes pulse-record {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 204, 0.7); }
            70% { box-shadow: 0 0 0 30px rgba(255, 0, 204, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 204, 0); }
        }
        
        .status-text {
            margin-top: 15px;
            font-size: 1.1em;
            color: #e0e0e0;
            min-height: 25px;
        }
        
        .recording-timer {
            font-size: 1.8em;
            font-weight: 700;
            color: #00d2ff;
            margin-top: 8px;
            font-variant-numeric: tabular-nums;
        }
        
        .visualizer {
            width: 100%;
            height: 100px;
            margin: 15px 0;
            border-radius: 12px;
            background: rgba(0,0,0,0.4);
        }
        
        .debug-log {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 12px;
            margin: 15px 0;
            font-size: 0.8em;
            color: #888;
            max-height: 150px;
            overflow-y: auto;
            font-family: monospace;
            direction: ltr;
            text-align: left;
        }
        
        .debug-log .log-error { color: #ff6b81; }
        .debug-log .log-success { color: #00ff88; }
        .debug-log .log-info { color: #00d2ff; }
        
        .results-section {
            display: none;
            margin-top: 25px;
        }
        
        .results-section.active {
            display: block;
            animation: fadeInUp 0.5s ease;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .song-result {
            background: linear-gradient(135deg, rgba(0, 210, 255, 0.1), rgba(255, 0, 204, 0.05));
            border-radius: 16px;
            padding: 20px;
            margin: 15px 0;
            border: 1px solid rgba(0, 210, 255, 0.2);
        }
        
        .song-header {
            display: flex;
            gap: 15px;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .album-art {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background: linear-gradient(135deg, #00d2ff, #ff00cc);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            flex-shrink: 0;
        }
        
        .song-details h2 {
            font-size: 1.3em;
            margin-bottom: 5px;
            color: #fff;
            line-height: 1.2;
        }
        
        .song-details .artist {
            font-size: 1em;
            color: #00d2ff;
        }
        
        .match-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            padding: 6px 12px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 0.8em;
            margin-top: 8px;
        }
        
        .links-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .link-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85em;
        }
        
        .link-btn.spotify { background: #1DB954; color: white; }
        .link-btn.youtube { background: #FF0000; color: white; }
        .link-btn.apple { background: #FA57C1; color: white; }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 22px;
            border-radius: 10px;
            border: none;
            font-size: 0.95em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            justify-content: center;
            min-width: 120px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: white;
            border: 1px solid rgba(255,255,255,0.15);
        }
        
        .loading-spinner {
            display: none;
            text-align: center;
            padding: 30px;
        }
        
        .loading-spinner.active {
            display: block;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 210, 255, 0.1);
            border-top-color: #00d2ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #00d2ff;
            font-size: 1em;
        }
        
        .error-box {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            color: #ff6b81;
            display: none;
        }
        
        .error-box.active {
            display: block;
        }
        
        .fallback-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            font-size: 0.85em;
        }
        
        .toggle-switch {
            position: relative;
            width: 40px;
            height: 22px;
            background: rgba(255,255,255,0.1);
            border-radius: 11px;
            cursor: pointer;
            transition: background 0.3s;
            flex-shrink: 0;
        }
        
        .toggle-switch.active {
            background: #00d2ff;
        }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            right: 2px;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        
        .toggle-switch.active::after {
            transform: translateX(-18px);
        }
        
        .mode-selector {
            display: flex;
            gap: 8px;
            margin: 15px 0;
            justify-content: center;
        }
        
        .mode-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #aaa;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .mode-btn.active {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white;
            border-color: transparent;
        }
        
        footer {
            text-align: center;
            padding: 30px 0;
            color: #555;
            font-size: 0.8em;
        }
        
        .api-info {
            background: rgba(0, 210, 255, 0.05);
            border-radius: 8px;
            padding: 10px;
            margin-top: 8px;
            font-size: 0.8em;
            color: #888;
            line-height: 1.5;
        }
        
        .api-info a {
            color: #00d2ff;
            text-decoration: none;
        }
        
        @media (max-width: 400px) {
            .logo { font-size: 2em; }
            .mic-button { width: 110px; height: 110px; font-size: 2.5em; }
            .song-header { flex-direction: column; align-items: center; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🎵 HumFinder Pro</div>
            <div class="subtitle">זיהוי שירים מתקדם</div>
            <div class="api-status offline" id="apiStatus">● מצב מקומי</div>
        </header>
        
        <div class="main-card">
            <div class="mode-selector">
                <button class="mode-btn active" id="modeLocal">🎵 מקומי</button>
                <button class="mode-btn" id="modeAPI">🌐 API</button>
            </div>
            
            <div class="api-config" id="apiConfig" style="display: none;">
                <h3>🔑 הגדרות API</h3>
                <div class="api-input-group">
                    <input type="text" class="api-input" id="apiKey" placeholder="הכנס API Key...">
                    <button class="btn-small" id="saveApiBtn">שמור</button>
                </div>
                <div class="api-info">
                    💡 <strong>AudD:</strong> הירשם ב-<a href="https://dashboard.audd.io" target="_blank">dashboard.audd.io</a><br>
                    💡 <strong>בדיקה:</strong> השתמש ב-"test" ל-3 זיהויים חינם
                </div>
            </div>
            
            <div class="mic-container">
                <button class="mic-button" id="micBtn">🎤</button>
                <div class="status-text" id="statusText">לחץ והחזק לזמזום</div>
                <div class="recording-timer" id="recordingTimer" style="display: none;">0.0s</div>
            </div>
            
            <canvas class="visualizer" id="visualizer"></canvas>
            
            <div class="debug-log" id="debugLog" style="display: none;">
                <div><strong>לוג פעולות:</strong></div>
            </div>
            
            <div class="loading-spinner" id="loadingSpinner">
                <div class="spinner"></div>
                <div class="loading-text" id="loadingText">מעבד...</div>
            </div>
            
            <div class="error-box" id="errorBox">
                <strong>❌ שגיאה:</strong> <span id="errorText"></span>
            </div>
            
            <div class="results-section" id="resultsSection">
                <div id="resultsList"></div>
                
                <div class="action-buttons">
                    <button class="btn btn-primary" id="retryBtn">🔄 נסה שוב</button>
                </div>
            </div>
        </div>
        
        <footer>
            <p>HumFinder Pro © 2026 | זיהוי מקומי + API</p>
        </footer>
    </div>

    <script>
        // ==================== לוג מובנה ====================
        function log(msg, type = 'info') {
            const debugLog = document.getElementById('debugLog');
            const line = document.createElement('div');
            line.className = 'log-' + type;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            debugLog.appendChild(line);
            debugLog.scrollTop = debugLog.scrollHeight;
            console.log(`[${type}] ${msg}`);
        }
