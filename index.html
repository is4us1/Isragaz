<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zamzeman Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Zamzeman</h1>
    </header>
    <main>
        <div id="recorder">
            <button id="recordButton">Start Recording</button>
            <button id="stopButton" disabled>Stop Recording</button>
            <audio controls id="audioPlayback"></audio>
        </div>
        <div id="songIdentification">
            <button id="identifySongButton">Identify Song</button>
            <div id="songInfo"></div>
        </div>
        <div id="musicComposer">
            <h2>Compose Music</h2>
            <textarea id="compositionInput"></textarea>
            <button id="composeButton">Compose</button>
            <div id="compositionOutput"></div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
