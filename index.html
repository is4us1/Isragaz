<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HumFinder - זיהוי שירים</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0 20px;
        }
        
        .logo {
            font-size: 2.5em;
            font-weight: 800;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #a0a0a0;
            margin-top: 8px;
            font-size: 1em;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            margin: 15px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .mode-btns {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #aaa;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .mode-btn.active {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
            border-color: transparent;
        }
        
        .api-box {
            display: none;
            margin-bottom: 20px;
        }
        
        .api-box.show {
            display: block;
        }
        
        .api-input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 0.95em;
            margin-bottom: 10px;
        }
        
        .api-input:focus {
            outline: none;
            border-color: #e94560;
        }
        
        .save-btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
        }
        
        .mic-wrap {
            text-align: center;
            padding: 20px 0;
        }
        
        .mic-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #e94560, #c73e54);
            color: white;
            font-size: 3em;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(233, 69, 96, 0.4);
            transition: all 0.3s;
            -webkit-touch-callout: none;
            user-select: none;
        }
        
        .mic-btn.recording {
            animation: pulse 1.2s infinite;
            background: linear-gradient(145deg, #ff6b6b, #ee5a6f);
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(233, 69, 96, 0.7); }
            70% { box-shadow: 0 0 0 30px rgba(233, 69, 96, 0); }
            100% { box-shadow: 0 0 0 0 rgba(233, 69, 96, 0); }
        }
        
        .status {
            margin-top: 15px;
            font-size: 1.1em;
            color: #ccc;
            min-height: 25px;
        }
        
        .timer {
            font-size: 1.6em;
            font-weight: 700;
            color: #e94560;
            margin-top: 8px;
            display: none;
        }
        
        .viz {
            width: 100%;
            height: 100px;
            margin: 15px 0;
            border-radius: 12px;
            background: rgba(0,0,0,0.3);
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(233, 69, 96, 0.2);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .results {
            display: none;
            margin-top: 20px;
        }
        
        .results.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .song-card {
            background: linear-gradient(135deg, rgba(233,69,96,0.15), rgba(15,52,96,0.2));
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(233,69,96,0.2);
        }
        
        .song-title {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .song-artist {
            color: #e94560;
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        
        .match-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .match-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #feca57);
            border-radius: 3px;
            transition: width 1s ease;
        }
        
        .links {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .link-btn {
            padding: 8px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85em;
            color: white;
        }
        
        .link-btn.yt { background: #FF0000; }
        .link-btn.sp { background: #1DB954; }
        
        .retry-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            margin-top: 15px;
        }
        
        .error {
            display: none;
            background: rgba(255,71,87,0.1);
            border: 1px solid rgba(255,71,87,0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            color: #ff6b81;
        }
        
        .error.show {
            display: block;
        }
        
        .tips {
            background: rgba(254,202,87,0.08);
            border-right: 3px solid #feca57;
            padding: 12px 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 0.9em;
            color: #ddd;
        }
        
        .tips strong {
            color: #feca57;
        }
        
        footer {
            text-align: center;
            padding: 30px 0;
            color: #555;
            font-size: 0.85em;
        }
    </style>
</head>

                <div class="timer" id="timer">0.0s</div>

            <canvas class="viz" id="viz"></canvas>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>

            </div>
            
            <div class="error" id="errorBox">

            <div class="results" id="results">

                <button class="retry-btn" onclick="reset()">🔄 נסה שוב</button>

        </div>
        
        <footer>

                }
