<!DOCTYPE html>
    <html lang="he" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HumFinder - זיהוי שירים</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
                min-height: 100vh;
                color: #fff;
            }
            
            .container {
                max-width: 600px;
                margin: 0 auto;
                padding: 20px;
            }
            
            header {
                text-align: center;
                padding: 30px 0;
            }
            
            .logo {
                font-size: 2.5em;
                font-weight: 800;
                background: linear-gradient(45deg, #e94560, #ff6b6b);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            
            .card {
                background: rgba(255,255,255,0.05);
                border-radius: 20px;
                padding: 25px;
                margin: 15px 0;
                border: 1px solid rgba(255,255,255,0.1);
            }
            
            .mic-btn {
                width: 140px;
                height: 140px;
                border-radius: 50%;
                border: none;
                background: linear-gradient(145deg, #e94560, #c73e54);
                color: white;
                font-size: 3em;
                cursor: pointer;
                display: block;
                margin: 20px auto;
                box-shadow: 0 10px 40px rgba(233, 69, 96, 0.4);
            }
            
            .mic-btn.recording {
                animation: pulse 1.2s infinite;
            }
            
            @keyframes pulse {
                0% { box-shadow: 0 0 0 0 rgba(233, 69, 96, 0.7); }
                70% { box-shadow: 0 0 0 30px rgba(233, 69, 96, 0); }
                100% { box-shadow: 0 0 0 0 rgba(233, 69, 96, 0); }
            }
            
            .status {
                text-align: center;
                font-size: 1.1em;
                color: #ccc;
                margin: 15px 0;
            }
            
            .result {
                display: none;
                background: linear-gradient(135deg, rgba(233,69,96,0.15), rgba(15,52,96,0.2));
                border-radius: 16px;
                padding: 20px;
                margin-top: 20px;
                border: 1px solid rgba(233,69,96,0.2);
            }
            
            .result.show { display: block; }
            
            .song-title { font-size: 1.5em; font-weight: 700; }
            .song-artist { color: #e94560; font-size: 1.1em; margin-top: 5px; }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <div class="logo">🎵 HumFinder</div>
            </header>
            
            <div class="card">
                <button class="mic-btn" id="micBtn">🎤</button>
                <div class="status" id="status">לחץ והחזק לזמזום</div>
                
                <div class="result" id="result">
                    <div class="song-title" id="songTitle"></div>
                    <div class="song-artist" id="songArtist"></div>
                </div>
            </div>
        </div>
        
        <script>
            // מאגר שירים
            var SONGS = [
                {title: "Happy Birthday", artist: "מסורתי", 
                 pattern: [264,264,297,264,352,330,264,264,297,264,396,352]},
                {title: "Hava Nagila", artist: "עממי ישראלי",
                 pattern: [392,440,494,523,494,440,392,440,494,523,587,523]},
                {title: "Let It Be", artist: "The Beatles",
                 pattern: [262,294,330,262,392,349,330,294,262,294,330,262]}
            ];
            
            var micBtn = document.getElementById('micBtn');
            var status = document.getElementById('status');
            var result = document.getElementById('result');
            var songTitle = document.getElementById('songTitle');
            var songArtist = document.getElementById('songArtist');
            
            var isRecording = false;
            var audioContext, analyser, microphone;
            var recordedFreqs = [];
            
            micBtn.addEventListener('mousedown', startRecording);
            micBtn.addEventListener('mouseup', stopRecording);
            micBtn.addEventListener('touchstart', function(e) { e.preventDefault(); startRecording(); });
            micBtn.addEventListener('touchend', function(e) { e.preventDefault(); stopRecording(); });
            
            function startRecording() {
                if (isRecording) return;
                isRecording = true;
                recordedFreqs = [];
                micBtn.classList.add('recording');
                status.textContent = 'מקליט... זמזם!';
                result.classList.remove('show');
                
                navigator.mediaDevices.getUserMedia({audio: true}).then(function(stream) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    microphone = audioContext.createMediaStreamSource(stream);
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 2048;
                    microphone.connect(analyser);
                    
                    var dataArray = new Uint8Array(analyser.frequencyBinCount);
                    
                    function analyze() {
                        if (!isRecording) return;
                        analyser.getByteFrequencyData(dataArray);
                        
                        var maxVal = 0, maxIndex = 0;
                        for (var i = 0; i < dataArray.length / 2; i++) {
                            if (dataArray[i] > maxVal) { maxVal = dataArray[i]; maxIndex = i; }
                        }
                        var freq = maxIndex * audioContext.sampleRate / (dataArray.length * 2);
                        if (freq > 80 && freq < 1200) recordedFreqs.push(Math.round(freq));
                        
                        requestAnimationFrame(analyze);
                    }
                    analyze();
                });
            }
            
            function stopRecording() {
                if (!isRecording) return;
                isRecording = false;
                micBtn.classList.remove('recording');
                status.textContent = 'מעבד...';
                
                if (microphone) microphone.disconnect();
                
                setTimeout(function() {
                    identifySong();
                }, 500);
            }
            
            function identifySong() {
                if (recordedFreqs.length < 5) {
                    status.textContent = 'לא נקלט מספיק. נסה שוב.';
                    return;
                }
                
                var bestMatch = null;
                var bestScore = 0;
                
                for (var i = 0; i < SONGS.length; i++) {
                    var score = comparePatterns(recordedFreqs, SONGS[i].pattern);
                    if (score > bestScore) {
                        bestScore = score;
                        bestMatch = SONGS[i];
                    }
                }
                
                if (bestMatch && bestScore > 15) {
                    songTitle.textContent = bestMatch.title;
                    songArtist.textContent = bestMatch.artist;
                    result.classList.add('show');
                    status.textContent = 'זוהה! 🎉';
                } else {
                    status.textContent = 'לא זוהה. נסה שיר אחר.';
                }
            }
            
            function comparePatterns(rec, pat) {
                var norm = function(arr) {
                    var min = Math.min.apply(null, arr);
                    var max = Math.max.apply(null, arr);
                    if (max === min) return arr.map(function() { return 0; });
                    return arr.map(function(v) { return (v - min) / (max - min); });
                };
                
                var nRec = norm(rec);
                var nPat = norm(pat);
                var matches = 0, total = 0;
                
                for (var i = 0; i < nPat.length; i += 2) {
                    var best = Infinity;
                    for (var j = 0; j < nRec.length; j++) {
                        var diff = Math.abs(nPat[i] - nRec[j]);
                        if (diff < best) best = diff;
                    }
                    if (best < 0.4) matches++;
                    total++;
                }
                
                return (matches / total) * 100;
            }
        </script>
    </body>
    </html>
''')
